name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - run: pip install -r requirements.txt ruff

      - name: Lint
        run: ruff check src/ app.py tests/

      - name: Format check
        run: ruff format --check src/ app.py tests/

      - name: Tests
        run: python -m pytest -v
